name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Run tests
        run: go test ./... -timeout 30s

      - name: Run vet
        run: go vet ./...

  build:
    name: Build Linux Binaries
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build binary
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          GOOS=linux GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-X main.version=${VERSION} -X main.commit=${{ github.sha }} -X main.buildDate=${BUILD_DATE}" \
            -o dist/shellai-${VERSION}-linux-${{ matrix.goarch }} \
            ./cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shellai-linux-${{ matrix.goarch }}
          path: dist/shellai-${{ github.ref_name }}-linux-${{ matrix.goarch }}

  checksum:
    name: Generate Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          cp artifacts/shellai-linux-amd64/shellai-${GITHUB_REF_NAME}-linux-amd64 release-assets/
          cp artifacts/shellai-linux-arm64/shellai-${GITHUB_REF_NAME}-linux-arm64 release-assets/
          (cd release-assets && sha256sum shellai-* > SHA256SUMS)
          ls -la release-assets

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*

  install-test:
    name: Test Installer in Docker
    needs: checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Prepare local release server payload
        run: |
          mkdir -p test-release/${GITHUB_REF_NAME}
          cp install.sh test-release/install.sh
          cp release-assets/* test-release/${GITHUB_REF_NAME}/

      - name: Start file server and test install script
        run: |
          set -euo pipefail
          docker network create shellai-release-test
          docker run -d --rm \
            --name shellai-release-server \
            --network shellai-release-test \
            -v "${{ github.workspace }}/test-release:/srv:ro" \
            -w /srv \
            python:3-alpine \
            python -m http.server 8000 --bind 0.0.0.0

          cleanup() {
            docker rm -f shellai-release-server >/dev/null 2>&1 || true
            docker network rm shellai-release-test >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run --rm \
            --network shellai-release-test \
            -e SHELLAI_VERSION=${GITHUB_REF_NAME} \
            -e SHELLAI_BASE_URL=http://shellai-release-server:8000 \
            -e SHELLAI_INSTALL_DIR=/tmp/shellai-bin \
            ubuntu:22.04 \
            bash -lc "apt-get update && apt-get install -y curl ca-certificates coreutils && curl -fsSL http://shellai-release-server:8000/install.sh | bash && /tmp/shellai-bin/shellai --version"

  release:
    name: Create Release
    needs: [test, checksum, install-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          body: |
            ## ShellAI ${{ github.ref_name }}

            ### Quick install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ### Assets

            - Linux amd64 binary
            - Linux arm64 binary
            - SHA256SUMS checksum file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
